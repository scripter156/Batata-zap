<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BatataZap 🥔</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f2ee;
            background-image: linear-gradient(to bottom, #da8f31 127px, #e9e5de 127px);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: white;
            width: 400px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.15);
        }

        h2 {
            color: #5c3a21;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #7f6855;
            font-size: 14px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1d6cd;
            border-radius: 8px;
            outline: none;
            font-size: 16px;
            transition: 0.2s;
        }

        input:focus {
            border-color: #da8f31;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #da8f31;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 10px;
        }

        button:hover {
            background-color: #be751c;
        }

        .switch-form {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            color: #7f6855;
        }

        .switch-form a {
            color: #da8f31;
            text-decoration: none;
            font-weight: bold;
            margin: 0 5px;
        }

        .hidden {
            display: none !important;
        }

        /* --- TELA PRINCIPAL APP --- */
        #app-screen {
            width: 95vw;
            max-width: 1200px;
            height: 90vh;
            background-color: #fdfbf7;
            display: flex;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .sidebar {
            width: 350px;
            background-color: #ffffff;
            border-right: 1px solid #e9e5de;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            background-color: #f5ece1;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e9e5de;
        }

        .sidebar-header h3 {
            color: #5c3a21;
        }

        .action-area {
            padding: 15px;
            background-color: #fff9f2;
            border-bottom: 1px solid #e9e5de;
        }

        .action-area input {
            padding: 8px;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .contact-list {
            flex: 1;
            overflow-y: auto;
        }

        .contact-item {
            padding: 15px;
            border-bottom: 1px solid #f4f2ee;
            cursor: pointer;
            transition: 0.2s;
        }

        .contact-item:hover {
            background-color: #fff4e6;
        }

        .contact-item.active {
            background-color: #ffe8cc;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #fcf8f2;
        }

        .chat-blank {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #a39284;
            font-size: 18px;
            flex-direction: column;
        }

        .chat-header {
            background-color: #f5ece1;
            padding: 17px 20px;
            border-bottom: 1px solid #e9e5de;
            color: #5c3a21;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #f4ecd8;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 60%;
            width: fit-content;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .msg.sent {
            background-color: #fcdfa2;
            margin-left: auto;
            color: #4a3111;
        }

        .msg.received {
            background-color: white;
            margin-right: auto;
            color: #333;
        }

        .file-link {
            display: block;
            color: #be751c;
            font-weight: bold;
            margin-top: 5px;
            text-decoration: underline;
        }

        .chat-input-bar {
            background-color: #f5ece1;
            padding: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input-bar input[type="text"] {
            flex: 1;
        }

        .file-label {
            background-color: #7f6855;
            color: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div id="register-screen" class="container">
        <h2>🥔 BatataZap - Criar Conta</h2>
        <div class="form-group"><label>Nome</label><input type="text" id="reg-name" placeholder="Seu nome"></div>
        <div class="form-group"><label>Gmail</label><input type="email" id="reg-email" placeholder="nome@gmail.com"></div>
        <div class="form-group"><label>Senha</label><input type="password" id="reg-password" placeholder="Sua senha"></div>
        <div class="form-group"><label>Número de Telefone</label><input type="tel" id="reg-phone" placeholder="Ex: 11999999999"></div>
        <button onclick="cadastrar()">Cadastrar e Entrar</button>
        <div class="switch-form">Já tenho uma conta? <a href="#" onclick="alternarTela('login')">Entrar</a></div>
    </div>

    <div id="login-screen" class="container hidden">
        <h2>🥔 BatataZap - Login</h2>
        <div class="form-group"><label>Gmail</label><input type="email" id="login-email" placeholder="nome@gmail.com"></div>
        <div class="form-group"><label>Número de Telefone</label><input type="tel" id="login-phone" placeholder="Ex: 11999999999"></div>
        <div class="form-group"><label>Senha</label><input type="password" id="login-password" placeholder="Sua senha"></div>
        <button onclick="login()">Entrar</button>
        <div class="switch-form">
            <a href="#" onclick="alternarTela('forgot')">Esqueci a Senha</a> |
            <a href="#" onclick="alternarTela('register')">Cadastre-se</a>
        </div>
    </div>

    <div id="forgot-screen" class="container hidden">
        <h2>🥔 Recuperar Senha</h2>
        <div id="step-1">
            <div class="form-group"><label>Gmail Cadastrado</label><input type="email" id="forgot-email" placeholder="nome@gmail.com"></div>
            <div class="form-group"><label>Número de Telefone</label><input type="tel" id="forgot-phone" placeholder="Ex: 11999999999"></div>
            <button onclick="enviarCodigoVerificacao()">Enviar Código</button>
        </div>
        
        <div id="step-2" class="hidden">
            <div class="form-group"><label style="color: #be751c;">Código enviado para o seu Gmail!</label><input type="text" id="verification-code-input" placeholder="Digite o código de 4 dígitos"></div>
            <button onclick="verificarCodigo()">Validar Código</button>
        </div>

        <div id="step-3" class="hidden">
            <div class="form-group"><label>Nova Senha</label><input type="password" id="new-password-input" placeholder="Digite a nova senha"></div>
            <button onclick="atualizarSenha()">Atualizar Senha</button>
        </div>
        <div class="switch-form"><a href="#" onclick="alternarTela('login')">Voltar para o Login</a></div>
    </div>

    <div id="app-screen" class="hidden">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3 id="my-profile-name">Meu Perfil</h3>
                <button style="width:auto; padding: 5px;" onclick="alert('Nome: '+usuarioLogado.nome+'\nEmail: '+usuarioLogado.email)">⚙️ Info</button>
            </div>
            <div class="action-area">
                <label>Adicionar pelo Número:</label>
                <input type="tel" id="search-phone" placeholder="Número do amigo...">
                <button onclick="adicionarContato()">Adicionar Batata-Amigo</button>
            </div>
            <div class="contact-list" id="contacts-container"></div>
        </div>

        <div class="chat-area">
            <div id="chat-blank-state" class="chat-blank">
                <span style="font-size: 50px;">🥔</span>
                <p>Selecione uma batata para conversar!</p>
            </div>
            <div id="chat-active-state" class="chat-area hidden">
                <div class="chat-header">
                    <h3 id="chat-with-name">Nome</h3>
                    <span id="chat-with-details" style="font-size:12px;"></span>
                </div>
                <div class="chat-messages" id="messages-container"></div>
                <div class="chat-input-bar">
                    <label class="file-label">📁<input type="file" id="file-input" style="display: none;" onchange="enviarArquivo(this)"></label>
                    <input type="text" id="message-text-input" placeholder="Digite uma mensagem...">
                    <button style="width:auto; padding:12px 20px;" onclick="enviarMensagemTexto()">Enviar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function obterUsuariosBD() {
            try { return JSON.parse(localStorage.getItem('bz_usuarios')) || {}; } 
            catch(e) { return {}; }
        }
        function salvarUsuariosBD(db) {
            localStorage.setItem('bz_usuarios', JSON.stringify(db));
        }
        function obterMensagensBD() {
            try { return JSON.parse(localStorage.getItem('bz_messages')) || []; } 
            catch(e) { return []; }
        }
        function salvarMensagensBD(msgs) {
            localStorage.setItem('bz_messages', JSON.stringify(msgs));
        }

        let usuarioLogado = null;
        let contatoAtivoNum = null;
        let codigoGerado = null;
        let telefoneRecuperacao = null;
        let totalMensagensAntigas = 0;

        function alternarTela(tela) {
            document.getElementById('register-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('forgot-screen').classList.add('hidden');
            
            if (tela === 'login') document.getElementById('login-screen').classList.remove('hidden');
            if (tela === 'register') document.getElementById('register-screen').classList.remove('hidden');
            if (tela === 'forgot') {
                document.getElementById('forgot-screen').classList.remove('hidden');
                document.getElementById('step-1').classList.remove('hidden');
                document.getElementById('step-2').classList.add('hidden');
                document.getElementById('step-3').classList.add('hidden');
            }
        }

        function cadastrar() {
            const nome = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const senha = document.getElementById('reg-password').value;
            const fone = document.getElementById('reg-phone').value.trim();

            if(!nome || !email || !senha || !fone) return alert("Por favor, preencha todos os campos!");

            let db = obterUsuariosBD();
            if(db[fone]) return alert("Esse número já possui conta!");

            db[fone] = { nome, email, senha, fone, contatos: [] };
            salvarUsuariosBD(db);

            alert("Conta criada!");
            fazerLoginEfetivo(db[fone]);
        }

        function login() {
            const email = document.getElementById('login-email').value.trim();
            const fone = document.getElementById('login-phone').value.trim();
            const senha = document.getElementById('login-password').value;

            if(!email || !fone || !senha) return alert("Preencha todos os campos!");

            let db = obterUsuariosBD();
            let conta = db[fone];

            if(conta && conta.email === email && conta.senha === senha) {
                fazerLoginEfetivo(conta);
            } else {
                alert("Dados incorretos! Verifique o Gmail, Número e Senha.");
            }
        }

        // --- SISTEMA DE RECUPERAÇÃO DE SENHA ---
        function enviarCodigoVerificacao() {
            const email = document.getElementById('forgot-email').value.trim();
            const fone = document.getElementById('forgot-phone').value.trim();

            let db = obterUsuariosBD();
            let conta = db[fone];

            if(conta && conta.email === email) {
                telefoneRecuperacao = fone;
                codigoGerado = Math.floor(1000 + Math.random() * 9000); // Gera código de 4 dígitos
                
                // Simulação de envio para o e-mail via Alerta
                alert(`[SIMULAÇÃO GMAIL]\nPara: ${email}\n\nSeu código de recuperação do BatataZap é: ${codigoGerado}`);
                
                document.getElementById('step-1').classList.add('hidden');
                document.getElementById('step-2').classList.remove('hidden');
            } else {
                alert("Nenhuma conta encontrada com essa combinação de Gmail e Telefone!");
            }
        }

        function verificarCodigo() {
            const codigoDigitado = document.getElementById('verification-code-input').value.trim();
            if(codigoDigitado === String(codigoGerado)) {
                alert("Código confirmado com sucesso!");
                document.getElementById('step-2').classList.add('hidden');
                document.getElementById('step-3').classList.remove('hidden');
            } else {
                alert("Código incorreto! Tente novamente.");
            }
        }

        function atualizarSenha() {
            const novaSenha = document.getElementById('new-password-input').value;
            if(!novaSenha) return alert("Digite a nova senha!");

            let db = obterUsuariosBD();
            if(db[telefoneRecuperacao]) {
                db[telefoneRecuperacao].senha = novaSenha;
                salvarUsuariosBD(db);
                alert("Senha atualizada com sucesso! Faça login agora.");
                alternarTela('login');
            }
        }

        // --- SISTEMA DE CHAT ---
        function fazerLoginEfetivo(usuario) {
            usuarioLogado = usuario;
            document.getElementById('register-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.body.style.backgroundImage = "none";

            document.getElementById('my-profile-name').innerText = "🥔 " + usuarioLogado.nome;
            atualizarListaContatos();
            
            // Loop para atualizar mensagens fixado (sem bugar a digitação do usuário)
            setInterval(renderizarMensagens, 1000);
        }

        function adicionarContato() {
            const numAlvo = document.getElementById('search-phone').value.trim();
            if(!numAlvo) return;
            if(numAlvo === usuarioLogado.fone) return alert("Você não pode se adicionar!");

            let db = obterUsuariosBD();
            let amigo = db[numAlvo];

            if(!amigo) return alert("Número não cadastrado!");

            if(!usuarioLogado.contatos) usuarioLogado.contatos = [];
            if(usuarioLogado.contatos.includes(numAlvo)) return alert("Já é seu contato!");

            usuarioLogado.contatos.push(numAlvo);
            db[usuarioLogado.fone].contatos = usuarioLogado.contatos;
            salvarUsuariosBD(db);

            document.getElementById('search-phone').value = "";
            alert(amigo.nome + " adicionado!");
            atualizarListaContatos();
        }

        function atualizarListaContatos() {
            const container = document.getElementById('contacts-container');
            container.innerHTML = "";
            let db = obterUsuariosBD();
            let meusContatos = usuarioLogado.contatos || [];

            meusContatos.forEach(foneNum => {
                let dadosAmigo = db[foneNum];
                if(!dadosAmigo) return;

                let item = document.createElement('div');
                item.className = "contact-item" + (contatoAtivoNum === foneNum ? " active" : "");
                item.onclick = function() { abrirConversa(foneNum); };
                item.innerHTML = '<div style="font-weight:bold;">🥔 '+dadosAmigo.nome+'</div><div style="font-size:12px;color:#7f6855">'+dadosAmigo.email+'</div>';
                container.appendChild(item);
            });
        }

        function abrirConversa(foneNum) {
            contatoAtivoNum = foneNum;
            let db = obterUsuariosBD();
            let amigo = db[foneNum];

            document.getElementById('chat-blank-state').classList.add('hidden');
            document.getElementById('chat-active-state').classList.remove('hidden');
            document.getElementById('chat-with-name').innerText = amigo.nome;
            document.getElementById('chat-with-details').innerText = amigo.email + " | Tel: " + amigo.fone;
            
            totalMensagensAntigas = 0; // Força recarregamento limpo ao trocar de chat
            atualizarListaContatos();
            renderizarMensagens();
        }

        function renderizarMensagens() {
            if(!contatoAtivoNum) return;
            const container = document.getElementById('messages-container');
            let todasMsgs = obterMensagensBD();

            let msgsFiltradas = todasMsgs.filter(m => 
                (m.de === usuarioLogado.fone && m.para === contatoAtivoNum) ||
                (m.de === contatoAtivoNum && m.para === usuarioLogado.fone)
            );

            // CORREÇÃO DO BUG: Só mexe no HTML se tiver mensagem nova real, evitando travar a digitação
            if(totalMensagensAntigas === msgsFiltradas.length) return;
            totalMensagensAntigas = msgsFiltradas.length;

            container.innerHTML = "";
            msgsFiltradas.forEach(m => {
                let div = document.createElement('div');
                div.className = "msg " + (m.de === usuarioLogado.fone ? "sent" : "received");
                if(m.tipo === 'texto') {
                    div.innerText = m.conteudo;
                } else {
                    div.innerHTML = '📁 <strong>Arquivo:</strong><br><a class="file-link" href="'+m.conteudo+'" download="'+m.nomeArquivo+'">'+m.nomeArquivo+'</a>';
                }
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        function enviarMensagemTexto() {
            const input = document.getElementById('message-text-input');
            const texto = input.value.trim();
            if(!texto || !contatoAtivoNum) return;

            let todasMsgs = obterMensagensBD();
            todasMsgs.push({ de: usuarioLogado.fone, para: contatoAtivoNum, tipo: 'texto', conteudo: texto });
            salvarMensagensBD(todasMsgs);
            input.value = "";
            renderizarMensagens();
            input.focus();
        }

        function enviarArquivo(inputElement) {
            const arquivo = inputElement.files[0];
            if(!arquivo || !contatoAtivoNum) return;

            const leitor = new FileReader();
            leitor.onload = function(e) {
                let todasMsgs = obterMensagensBD();
                todasMsgs.push({ de: usuarioLogado.fone, para: contatoAtivoNum, tipo: 'arquivo', conteudo: e.target.result, nomeArquivo: arquivo.name });
                salvarMensagensBD(todasMsgs);
                renderizarMensagens();
            };
            leitor.readAsDataURL(arquivo);
            inputElement.value = "";
        }
    </script>
</body>
</html>
